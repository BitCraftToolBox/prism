name: Build Prism docker image
on:
  workflow_dispatch:
    inputs:
      do_binding_update:
        description: 'Update upstream cacheless bindings'
        type: boolean
        required: false
        default: false
  push:
    branches:
      - main
    paths:
      - 'prism/**'
      - 'Dockerfile'

jobs:
  build-prism:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: bitcrafttoolbox/prism
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Update upstream bindings
        if: ${{ github.event_name != 'push' && inputs.do_binding_update }}
        run: |
          cargo update bindings

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Update bindings: $(date +%Y-%m-%d)"
            git push origin
          fi
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: BitCraftToolBox
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache-filters: config
          github-token: '${{ secrets.GITHUB_TOKEN }}'
