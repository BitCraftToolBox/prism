# Directory containing per-region subdirectories produced by the dumper.
input_dir = "dumps"

# Prefix used to form region directory names: "{input_dir}/{region_prefix}{N}/"
# e.g. region 7 → "dumps/bitcraft-live-7/"
region_prefix = "bitcraft-live-"

# Root directory for all rendered output.
output_dir = "output"

# Optional: command to run after each successful render commit.
# Two placeholders are expanded before the command is executed:
#   {}      — absolute path of the committed output directory
#             (e.g. /data/roads/tiles)
#   {root}  — absolute path of output_dir, the common root for all renderers
#             (e.g. /data).  Passing both lets the upload script reconstruct
#             the full relative path (roads/tiles) on the remote host.
# The command is run via `sh -c`.
# Example:
#   run_on_complete = "/app/upload_tiles.sh {} {root}"

# ── scheduled tasks ───────────────────────────────────────────────────────────
# Cron expressions use 6 fields: sec  min  hour  dom  month  dow
# Examples:
#   "0 0 * * * *"    — every hour, on the hour
#   "0 */10 * * * *" — every 10 minutes

[[tasks]]
renderer = "terrain"
schedule = "0 0 * * * *"

[[tasks]]
renderer = "game"
schedule = "0 0 * * * *"

[[tasks]]
renderer = "roads"
schedule = "0 */10 * * * *"

